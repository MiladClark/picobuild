name: Release

# Push a tag like "v1.2.0" (matching the version in package.json) to trigger
# this. It builds the Windows portable exe and the macOS zips (Intel + Apple
# Silicon) in parallel and publishes them straight to a GitHub Release —
# no manual build/upload needed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: release:win
          - os: macos-latest
            script: release:mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Tag $TAG_NAME does not match package.json version $PKG_VERSION. Bump the version in package.json to match before tagging."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (${{ matrix.os }})
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
